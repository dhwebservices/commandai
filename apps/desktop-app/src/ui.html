<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>Comandr</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
        background: #0D0D0D;
        color: #E5E5E5;
        height: 100vh;
        overflow: hidden;
        -webkit-font-smoothing: antialiased;
      }

      .app {
        display: flex;
        height: 100vh;
      }

      /* Sidebar */
      .sidebar {
        width: 220px;
        background: #171717;
        border-right: 1px solid #2B2B2B;
        display: flex;
        flex-direction: column;
      }

      .sidebar-header {
        padding: 1.25rem 1rem;
        border-bottom: 1px solid #2B2B2B;
      }

      .logo {
        font-size: 1.25rem;
        font-weight: 700;
        color: #FFFFFF;
        letter-spacing: -0.02em;
      }

      .device-info {
        margin-top: 0.5rem;
        font-size: 0.75rem;
        color: #737373;
      }

      .sidebar-nav {
        flex: 1;
        overflow-y: auto;
        padding: 0.5rem 0;
      }

      .nav-section {
        margin-bottom: 1rem;
      }

      .nav-section-title {
        font-size: 0.6rem;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: #525252;
        padding: 0.75rem 1rem 0.5rem;
        font-weight: 600;
      }

      .nav-item {
        padding: 0.5rem 1rem;
        font-size: 0.875rem;
        color: #A3A3A3;
        cursor: pointer;
        transition: all 0.15s ease;
        display: flex;
        align-items: center;
        gap: 0.625rem;
        font-weight: 500;
        border-left: 2px solid transparent;
      }

      .nav-item:hover {
        background: rgba(255, 255, 255, 0.03);
        color: #E5E5E5;
      }

      .nav-item.active {
        background: rgba(59, 130, 246, 0.1);
        color: #3B82F6;
        border-left-color: #3B82F6;
      }

      .nav-icon {
        width: 18px;
        height: 18px;
        stroke-width: 2;
      }

      .sidebar-footer {
        padding: 1rem;
        border-top: 1px solid #2B2B2B;
      }

      .user-profile {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        padding: 0.625rem;
        border-radius: 8px;
        cursor: pointer;
        transition: background 0.15s;
      }

      .user-profile:hover {
        background: rgba(255, 255, 255, 0.03);
      }

      .user-avatar {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        background: #2B2B2B;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.75rem;
        font-weight: 600;
        color: #737373;
      }

      .user-details {
        flex: 1;
        min-width: 0;
      }

      .user-name {
        font-size: 0.8rem;
        font-weight: 600;
        color: #E5E5E5;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .user-role {
        font-size: 0.7rem;
        color: #737373;
      }

      /* Main Content */
      .main {
        flex: 1;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      .topbar {
        height: 60px;
        background: #171717;
        border-bottom: 1px solid #2B2B2B;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 1.5rem;
        -webkit-app-region: drag;
      }

      .topbar-left {
        display: flex;
        align-items: center;
        gap: 1rem;
      }

      .page-title {
        font-size: 1.125rem;
        font-weight: 600;
        color: #FFFFFF;
      }

      .connection-status {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        font-size: 0.75rem;
        color: #737373;
      }

      .status-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: #22C55E;
      }

      .topbar-right {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        -webkit-app-region: no-drag;
      }

      .topbar-btn {
        padding: 0.5rem;
        background: transparent;
        border: none;
        border-radius: 6px;
        color: #A3A3A3;
        cursor: pointer;
        transition: all 0.15s;
      }

      .topbar-btn:hover {
        background: rgba(255, 255, 255, 0.05);
        color: #E5E5E5;
      }

      /* Content Area */
      .content {
        flex: 1;
        overflow-y: auto;
        padding: 1.5rem;
      }

      .view {
        display: none;
      }

      .view.active {
        display: block;
      }

      /* Home View */
      .stats-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 1rem;
        margin-bottom: 1.5rem;
      }

      .stat-card {
        background: #171717;
        border: 1px solid #2B2B2B;
        border-radius: 10px;
        padding: 1.25rem;
        transition: all 0.15s;
      }

      .stat-card:hover {
        border-color: #404040;
      }

      .stat-label {
        font-size: 0.7rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: #737373;
        margin-bottom: 0.75rem;
        font-weight: 600;
      }

      .stat-value {
        font-size: 1.75rem;
        font-weight: 700;
        color: #FFFFFF;
        margin-bottom: 0.25rem;
      }

      .stat-subtitle {
        font-size: 0.75rem;
        color: #A3A3A3;
      }

      .stat-progress {
        width: 100%;
        height: 4px;
        background: #2B2B2B;
        border-radius: 2px;
        overflow: hidden;
        margin-top: 0.75rem;
      }

      .stat-progress-fill {
        height: 100%;
        background: #3B82F6;
        border-radius: 2px;
        transition: width 0.3s ease;
      }

      .stat-progress-fill.healthy {
        background: #22C55E;
      }

      .stat-progress-fill.warning {
        background: #F59E0B;
      }

      .stat-progress-fill.critical {
        background: #EF4444;
      }

      .section {
        margin-bottom: 1.5rem;
      }

      .section-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 1rem;
      }

      .section-title {
        font-size: 0.875rem;
        font-weight: 600;
        color: #E5E5E5;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }

      .section-action {
        font-size: 0.8rem;
        color: #3B82F6;
        cursor: pointer;
        font-weight: 500;
      }

      .section-action:hover {
        text-decoration: underline;
      }

      .actions-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
        gap: 1rem;
      }

      .action-card {
        background: #171717;
        border: 1px solid #2B2B2B;
        border-radius: 10px;
        padding: 1.25rem;
        text-align: center;
        cursor: pointer;
        transition: all 0.15s;
      }

      .action-card:hover {
        background: rgba(59, 130, 246, 0.05);
        border-color: #3B82F6;
        transform: translateY(-2px);
      }

      .action-icon {
        width: 32px;
        height: 32px;
        margin: 0 auto 0.75rem;
        color: #A3A3A3;
      }

      .action-card:hover .action-icon {
        color: #3B82F6;
      }

      .action-label {
        font-size: 0.8rem;
        font-weight: 600;
        color: #E5E5E5;
      }

      /* Activity Feed */
      .activity-list {
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
      }

      .activity-item {
        background: #171717;
        border: 1px solid #2B2B2B;
        border-radius: 10px;
        padding: 1rem;
        cursor: pointer;
        transition: all 0.15s;
      }

      .activity-item:hover {
        border-color: #404040;
      }

      .activity-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        margin-bottom: 0.5rem;
      }

      .activity-title {
        font-size: 0.9rem;
        font-weight: 600;
        color: #FFFFFF;
      }

      .activity-badge {
        padding: 0.25rem 0.625rem;
        border-radius: 6px;
        font-size: 0.65rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.03em;
      }

      .activity-badge.completed {
        background: rgba(34, 197, 94, 0.15);
        color: #22C55E;
      }

      .activity-badge.running {
        background: rgba(59, 130, 246, 0.15);
        color: #3B82F6;
      }

      .activity-badge.failed {
        background: rgba(239, 68, 68, 0.15);
        color: #EF4444;
      }

      .activity-desc {
        font-size: 0.8rem;
        color: #A3A3A3;
        margin-bottom: 0.5rem;
      }

      .activity-meta {
        font-size: 0.7rem;
        color: #737373;
      }

      .activity-details {
        margin-top: 1rem;
        padding-top: 1rem;
        border-top: 1px solid #2B2B2B;
        display: none;
      }

      .activity-item.expanded .activity-details {
        display: block;
      }

      .detail-section {
        margin-bottom: 0.75rem;
      }

      .detail-label {
        font-size: 0.7rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: #737373;
        margin-bottom: 0.5rem;
        font-weight: 600;
      }

      .detail-content {
        background: #0D0D0D;
        border: 1px solid #2B2B2B;
        border-radius: 6px;
        padding: 0.75rem;
        font-family: 'Monaco', 'Courier New', monospace;
        font-size: 0.7rem;
        color: #A3A3A3;
        max-height: 200px;
        overflow-y: auto;
      }

      /* Command Bar */
      .command-bar {
        margin-bottom: 1.5rem;
      }

      .command-input-wrapper {
        position: relative;
        background: #171717;
        border: 1px solid #2B2B2B;
        border-radius: 10px;
        padding: 0.875rem 1.125rem;
        transition: all 0.15s;
      }

      .command-input-wrapper:focus-within {
        border-color: #3B82F6;
        box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
      }

      .command-input {
        width: 100%;
        background: none;
        border: none;
        outline: none;
        color: #FFFFFF;
        font-size: 0.95rem;
        font-weight: 500;
      }

      .command-input::placeholder {
        color: #525252;
      }

      .command-suggestions {
        display: flex;
        gap: 0.5rem;
        margin-top: 0.75rem;
        flex-wrap: wrap;
      }

      .suggestion-chip {
        padding: 0.375rem 0.75rem;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid #2B2B2B;
        border-radius: 6px;
        font-size: 0.75rem;
        color: #A3A3A3;
        cursor: pointer;
        transition: all 0.15s;
        font-weight: 500;
      }

      .suggestion-chip:hover {
        background: rgba(59, 130, 246, 0.1);
        border-color: #3B82F6;
        color: #3B82F6;
      }

      /* Empty State */
      .empty-state {
        text-align: center;
        padding: 3rem 1rem;
      }

      .empty-icon {
        width: 48px;
        height: 48px;
        margin: 0 auto 1rem;
        color: #404040;
      }

      .empty-title {
        font-size: 1rem;
        font-weight: 600;
        color: #E5E5E5;
        margin-bottom: 0.5rem;
      }

      .empty-desc {
        font-size: 0.875rem;
        color: #737373;
        margin-bottom: 1.5rem;
      }

      .btn-primary {
        padding: 0.625rem 1.25rem;
        background: #3B82F6;
        border: none;
        border-radius: 8px;
        color: #FFFFFF;
        font-size: 0.875rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.15s;
      }

      .btn-primary:hover {
        background: #2563EB;
      }

      /* Table */
      .table-container {
        background: #171717;
        border: 1px solid #2B2B2B;
        border-radius: 10px;
        overflow: hidden;
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      thead {
        background: #0D0D0D;
        border-bottom: 1px solid #2B2B2B;
      }

      th {
        padding: 0.875rem 1rem;
        text-align: left;
        font-size: 0.7rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: #737373;
      }

      td {
        padding: 0.875rem 1rem;
        font-size: 0.875rem;
        color: #E5E5E5;
        border-bottom: 1px solid #2B2B2B;
      }

      tr:last-child td {
        border-bottom: none;
      }

      tbody tr:hover {
        background: rgba(255, 255, 255, 0.02);
      }

      /* Scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }

      ::-webkit-scrollbar-track {
        background: transparent;
      }

      ::-webkit-scrollbar-thumb {
        background: #2B2B2B;
        border-radius: 4px;
      }

      ::-webkit-scrollbar-thumb:hover {
        background: #404040;
      }

      /* Modal */
      .modal {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0, 0, 0, 0.85);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        backdrop-filter: blur(4px);
      }

      .modal-content {
        background: #171717;
        border: 1px solid #2B2B2B;
        border-radius: 12px;
        width: 90%;
        max-width: 500px;
        max-height: 90vh;
        overflow-y: auto;
      }

      .modal-header {
        padding: 1.5rem;
        border-bottom: 1px solid #2B2B2B;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .modal-header h2 {
        font-size: 1.125rem;
        font-weight: 600;
        color: #FFFFFF;
      }

      .modal-close {
        background: none;
        border: none;
        color: #737373;
        font-size: 1.5rem;
        cursor: pointer;
        padding: 0;
        width: 32px;
        height: 32px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 6px;
        transition: all 0.15s ease;
      }

      .modal-close:hover {
        background: rgba(255, 255, 255, 0.05);
        color: #E5E5E5;
      }

      .modal-body {
        padding: 1.5rem;
      }

      .modal-footer {
        padding: 1.5rem;
        border-top: 1px solid #2B2B2B;
        display: flex;
        gap: 0.75rem;
        justify-content: flex-end;
      }

      .form-group {
        margin-bottom: 1.25rem;
      }

      .form-group label {
        display: block;
        font-size: 0.875rem;
        font-weight: 500;
        color: #E5E5E5;
        margin-bottom: 0.5rem;
      }

      .form-input {
        width: 100%;
        padding: 0.75rem;
        background: #0D0D0D;
        border: 1px solid #2B2B2B;
        border-radius: 6px;
        color: #E5E5E5;
        font-size: 0.875rem;
        transition: all 0.15s ease;
      }

      .form-input:focus {
        outline: none;
        border-color: #3B82F6;
        background: #121212;
      }

      /* Small Buttons */
      .btn-sm {
        padding: 0.375rem 0.75rem;
        font-size: 0.75rem;
        font-weight: 500;
        border: 1px solid #2B2B2B;
        border-radius: 6px;
        background: #171717;
        color: #E5E5E5;
        cursor: pointer;
        transition: all 0.15s ease;
      }

      .btn-sm:hover {
        background: #1F1F1F;
        border-color: #404040;
      }

      .btn-danger {
        color: #EF4444;
        border-color: rgba(239, 68, 68, 0.3);
      }

      .btn-danger:hover {
        background: rgba(239, 68, 68, 0.1);
        border-color: #EF4444;
      }

      .btn-secondary {
        padding: 0.625rem 1.25rem;
        font-size: 0.875rem;
        font-weight: 500;
        border: 1px solid #2B2B2B;
        border-radius: 6px;
        background: #171717;
        color: #E5E5E5;
        cursor: pointer;
        transition: all 0.15s ease;
      }

      .btn-secondary:hover {
        background: #1F1F1F;
        border-color: #404040;
      }

      /* Toast animations */
      @keyframes slideIn {
        from {
          transform: translateX(400px);
          opacity: 0;
        }
        to {
          transform: translateX(0);
          opacity: 1;
        }
      }

      @keyframes slideOut {
        from {
          transform: translateX(0);
          opacity: 1;
        }
        to {
          transform: translateX(400px);
          opacity: 0;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <!-- Sidebar -->
      <div class="sidebar">
        <div class="sidebar-header">
          <div class="logo">Comandr</div>
          <div class="device-info" id="deviceName">Loading...</div>
        </div>

        <div class="sidebar-nav">
          <div class="nav-section">
            <div class="nav-item active" data-view="home">
              <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
              </svg>
              Home
            </div>
            <div class="nav-item" data-view="devices">
              <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
              </svg>
              Devices
            </div>
            <div class="nav-item" data-view="applications">
              <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/>
              </svg>
              Applications
            </div>
          </div>

          <div class="nav-section">
            <div class="nav-section-title">System</div>
            <div class="nav-item" data-view="security">
              <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
              </svg>
              Security
            </div>
            <div class="nav-item" data-view="networking">
              <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9"/>
              </svg>
              Networking
            </div>
            <div class="nav-item" data-view="storage">
              <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4m0 5c0 2.21-3.582 4-8 4s-8-1.79-8-4"/>
              </svg>
              Storage
            </div>
            <div class="nav-item" data-view="processes">
              <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"/>
              </svg>
              Processes
            </div>
          </div>

          <div class="nav-section">
            <div class="nav-section-title">Management</div>
            <div class="nav-item" data-view="activity">
              <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
              </svg>
              Activity
            </div>
            <div class="nav-item" data-view="automation">
              <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z"/>
              </svg>
              Automation
            </div>
