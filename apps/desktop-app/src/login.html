<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>Comandr - Sign In</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
        background: #0D0D0D;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        -webkit-font-smoothing: antialiased;
        color: #E5E5E5;
      }

      .background {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: radial-gradient(circle at 50% 20%, rgba(59, 130, 246, 0.05) 0%, transparent 60%);
        pointer-events: none;
      }

      .login-container {
        background: #171717;
        border: 1px solid #2B2B2B;
        border-radius: 12px;
        padding: 3rem 2.5rem;
        width: 100%;
        max-width: 420px;
        position: relative;
        z-index: 1;
      }

      .logo {
        font-size: 1.75rem;
        font-weight: 700;
        color: #FFFFFF;
        letter-spacing: -0.02em;
        margin-bottom: 0.75rem;
      }

      .subtitle {
        font-size: 0.875rem;
        color: #A3A3A3;
        margin-bottom: 2rem;
        font-weight: 500;
      }

      .form-group {
        margin-bottom: 1.25rem;
      }

      label {
        display: block;
        font-size: 0.75rem;
        font-weight: 600;
        color: #A3A3A3;
        margin-bottom: 0.5rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }

      input {
        width: 100%;
        padding: 0.875rem 1rem;
        background: #0D0D0D;
        border: 1px solid #2B2B2B;
        border-radius: 8px;
        font-size: 0.95rem;
        color: #FFFFFF;
        transition: all 0.15s ease;
      }

      input::placeholder {
        color: #525252;
      }

      input:focus {
        outline: none;
        border-color: #3B82F6;
        box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
      }

      .btn-primary {
        width: 100%;
        padding: 0.875rem;
        background: #3B82F6;
        border: none;
        border-radius: 8px;
        color: #FFFFFF;
        font-size: 0.875rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.15s ease;
        margin-top: 0.5rem;
      }

      .btn-primary:hover {
        background: #2563EB;
      }

      .btn-primary:active {
        transform: scale(0.98);
      }

      .btn-primary:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .error {
        background: rgba(239, 68, 68, 0.1);
        border: 1px solid rgba(239, 68, 68, 0.2);
        color: #EF4444;
        padding: 0.875rem;
        border-radius: 8px;
        font-size: 0.875rem;
        margin-bottom: 1rem;
        font-weight: 500;
      }

      .links {
        margin-top: 1.5rem;
        text-align: center;
      }

      .link {
        color: #3B82F6;
        text-decoration: none;
        font-size: 0.875rem;
        font-weight: 500;
        transition: color 0.15s;
      }

      .link:hover {
        color: #2563EB;
      }

      .divider {
        margin: 0.75rem 0;
        color: #525252;
        font-size: 0.875rem;
      }

      .footer {
        margin-top: 2rem;
        padding-top: 1.5rem;
        border-top: 1px solid #2B2B2B;
        text-align: center;
        font-size: 0.7rem;
        color: #525252;
      }

      .footer-item {
        display: inline-block;
        margin: 0 0.75rem;
      }

      .account-type-selector {
        display: none;
        margin-bottom: 1.5rem;
      }

      .account-types {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0.75rem;
      }

      .account-type-card {
        padding: 1rem;
        background: #0D0D0D;
        border: 2px solid #2B2B2B;
        border-radius: 8px;
        cursor: pointer;
        transition: all 0.15s;
        text-align: center;
      }

      .account-type-card:hover {
        border-color: #404040;
      }

      .account-type-card.selected {
        border-color: #3B82F6;
        background: rgba(59, 130, 246, 0.05);
      }

      .account-type-icon {
        font-size: 1.5rem;
        margin-bottom: 0.5rem;
      }

      .account-type-title {
        font-size: 0.875rem;
        font-weight: 600;
        color: #E5E5E5;
        margin-bottom: 0.25rem;
      }

      .account-type-desc {
        font-size: 0.7rem;
        color: #737373;
      }
    </style>
  </head>
  <body>
    <div class="background"></div>

    <div class="login-container">
      <div class="logo">Comandr</div>
      <div class="subtitle">Welcome back. Sign in to continue.</div>

      <form id="loginForm">
        <div id="errorContainer"></div>

        <div class="form-group">
          <label for="username">Username</label>
          <input
            type="text"
            id="username"
            autocomplete="username"
            placeholder="Enter your username"
            required
          />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            autocomplete="current-password"
            placeholder="Enter your password"
            required
          />
        </div>

        <button type="submit" class="btn-primary" id="submitBtn">Sign In</button>
      </form>

      <div class="links">
        <a href="#" class="link" id="forgotPassword">Forgot password?</a>
        <div class="divider">•</div>
        <a href="#" class="link" id="createAccount">Create account</a>
        <div class="divider">•</div>
        <a href="#" class="link" id="joinOrg">Join organization</a>
      </div>

      <div class="footer">
        <span class="footer-item">🔒 Secure connection</span>
        <span class="footer-item">Version 1.0</span>
        <span class="footer-item">© Comandr</span>
      </div>
    </div>

    <script>
      const { ipcRenderer } = require('electron');

      const form = document.getElementById('loginForm');
      const submitBtn = document.getElementById('submitBtn');
      const errorContainer = document.getElementById('errorContainer');
      const usernameInput = document.getElementById('username');
      const passwordInput = document.getElementById('password');

      form.addEventListener('submit', async (e) => {
        e.preventDefault();

        const username = usernameInput.value.trim();
        const password = passwordInput.value;

        if (!username || !password) return;

        submitBtn.disabled = true;
        submitBtn.textContent = 'Signing in...';
        errorContainer.innerHTML = '';

        try {
          await ipcRenderer.invoke('login', { username, password });
          // Login successful, window will close automatically
        } catch (err) {
          errorContainer.innerHTML = `<div class="error">${err.message}</div>`;
          submitBtn.disabled = false;
          submitBtn.textContent = 'Sign In';
        }
      });

      document.getElementById('forgotPassword').addEventListener('click', (e) => {
        e.preventDefault();
        alert('Password reset functionality coming soon');
      });

      document.getElementById('createAccount').addEventListener('click', (e) => {
        e.preventDefault();
        alert('Account creation functionality coming soon');
      });

      document.getElementById('joinOrg').addEventListener('click', (e) => {
        e.preventDefault();
        alert('Organization join functionality coming soon');
      });
    </script>
  </body>
</html>
