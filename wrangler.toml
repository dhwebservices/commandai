# Cloudflare Workers configuration for Comandr API
name = "comandr-api"
main = "apps/api-gateway/src/worker.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[build]
command = ""

[vars]
NODE_ENV = "production"
LOG_LEVEL = "info"
API_GATEWAY_PORT = "8787"

# Environment variables (set via: wrangler secret put VARIABLE_NAME)
# SUPABASE_URL
# SUPABASE_ANON_KEY
# SUPABASE_SERVICE_ROLE_KEY
# RESEND_API_KEY
# RESEND_FROM_EMAIL
# WEB_APP_URL

# Cloudflare Workers has generous free tier:
# - 100,000 requests/day
# - 10ms CPU time per request
# - Always online, globally distributed
# Cost: $0/month for most apps!

[observability]
enabled = true
head_sampling_rate = 1
