syntax = "proto3";

package commandai.agent.v1;

// Agent <-> Cloud protocol. Breaking changes to this file require an RFC
// (see docs/architecture/RFC_PROCESS.md) and must pass buf breaking checks
// against the last two released agent versions.

message Intent {
  string id = 1;
  string tenant_id = 2;
  string capability_id = 3;
  string parameters_json = 4; // JSON-encoded, validated against Capability.parameterSchema
  string reasoning = 5;
  string requested_by = 6;
  string created_at = 7;
}

message ActionStatus {
  string action_id = 1;
  string state = 2; // must match ActionState in packages/schema
  string occurred_at = 3;
}

message EnrollRequest {
  string token_id = 1;
  string token_secret = 2;
}

message EnrollResponse {
  string agent_id = 1;
  string tenant_id = 2;
  string issued_at = 3;
  string rotates_at = 4;
}

// Remote session signaling messages for WebRTC coordination
message RemoteSessionMessage {
  string session_id = 1;
  oneof message_type {
    SessionOffer offer = 2;
    SessionAnswer answer = 3;
    ICECandidate ice_candidate = 4;
    SessionDisconnect disconnect = 5;
  }
}

message SessionOffer {
  string sdp = 1;
  SessionConfig config = 2;
}

message SessionAnswer {
  string sdp = 1;
}

message ICECandidate {
  string candidate = 1;
  string sdp_mid = 2;
  int32 sdp_m_line_index = 3;
}

message SessionDisconnect {
  string reason = 1;
}

message SessionConfig {
  bool enable_video = 1;
  bool enable_audio = 2;
  bool enable_control = 3;
  string video_quality = 4; // "low", "medium", "high", "ultra"
}

service AgentChannel {
  // One-time enrollment: exchange enrollment token for long-lived credential.
  // Agent presents token + client cert via mTLS; receives agent_id in response.
  rpc Enroll(EnrollRequest) returns (EnrollResponse);

  // Cloud pushes an Intent for the agent to evaluate/execute.
  rpc StreamIntents(stream Ack) returns (stream Intent);

  // Agent pushes status/telemetry back to cloud.
  rpc StreamStatus(stream ActionStatus) returns (stream Ack);

  // Bidirectional streaming for WebRTC signaling (offers, answers, ICE candidates)
  rpc StreamRemoteSession(stream RemoteSessionMessage) returns (stream RemoteSessionMessage);
}

message Ack {
  string ref_id = 1;
  bool ok = 2;
}
