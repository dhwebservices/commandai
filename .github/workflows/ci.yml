name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Audit (npm)
        run: pnpm audit --audit-level=high || true

  # Note: there is intentionally no CI job that applies supabase/migrations/
  # against a live database — that would require a disposable Supabase
  # branch/project per CI run, which isn't set up yet (tracked follow-up).
  # The removed "migrations" job here only tested the deprecated local
  # Postgres path (infra/db/migrations) and was misleading to keep green
  # once ADR-009 made Supabase the real schema — see supabase/migrations/README.md.

  contract-tests:
    runs-on: ubuntu-latest
    needs: ci
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Schema/Proto contract compatibility
        run: pnpm turbo run contract-test
